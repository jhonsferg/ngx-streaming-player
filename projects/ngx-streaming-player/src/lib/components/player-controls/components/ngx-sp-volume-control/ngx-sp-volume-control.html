<div class="volume-wrap" [class.volume-wrap--muted]="isMuted()">

  <!-- Mute toggle icon button -->
  <button class="volume-wrap__icon-btn" (click)="onToggleMute()" [attr.aria-label]="isMuted() ? 'Unmute' : 'Mute'">
    <span class="volume-wrap__icon-btn-ripple" [class.active]="rippleActive()"></span>

    @if (isMuted() || volume() === 0) {
      <!-- Muted -->
      <svg viewBox="0 0 24 24" fill="currentColor" class="icon icon--muted">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    } @else if (volume() < 0.4) {
      <!-- Low volume -->
      <svg viewBox="0 0 24 24" fill="currentColor" class="icon">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
    } @else {
      <!-- High volume -->
      <svg viewBox="0 0 24 24" fill="currentColor" class="icon">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    }
  </button>

  <!-- Slider container (expands on hover) -->
  <div class="volume-wrap__slider-area" [style.--vol]="volume()">
    <!-- Custom track layers -->
    <div class="volume-wrap__track">
      <div class="volume-wrap__track-fill"></div>
    </div>

    <!-- Native range (transparent, sits on top) -->
    <input
      type="range"
      class="volume-wrap__range"
      min="0"
      max="1"
      step="0.01"
      [value]="isMuted() ? 0 : volume()"
      (input)="onVolumeInput($event)"
      aria-label="Volume">

    <!-- Volume % tooltip on drag -->
    <div class="volume-wrap__pct">{{ volumePct() }}%</div>
  </div>
</div>
