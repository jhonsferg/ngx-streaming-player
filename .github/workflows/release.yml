name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build library
        run: npm run build:lib

      - name: Pack library
        id: pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/ngx-streaming-player
          npm pack
          TARBALL="ngx-streaming-player-${VERSION}.tgz"
          mv "ngx-streaming-player-${VERSION}.tgz" "../../${TARBALL}"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.pack.outputs.version }}"
          # Extract content between ## [VERSION] and the next ## [
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          # Strip leading/trailing blank lines
          sed -i '/./,$!d' release_notes.md
          echo "Generated release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.pack.outputs.version }}"
          body_path: release_notes.md
          files: ${{ steps.pack.outputs.tarball }}
          draft: false
          prerelease: false
          make_latest: true
