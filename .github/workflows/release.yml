name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Package & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Setup for GitHub Release + tarball ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build library
        run: npm run build:lib

      - name: Pack library tarball
        id: pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/ngx-streaming-player
          npm pack
          TARBALL="ngx-streaming-player-${VERSION}.tgz"
          mv "ngx-streaming-player-${VERSION}.tgz" "../../${TARBALL}"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.pack.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          sed -i '/./,$!d' release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.pack.outputs.version }}"
          body_path: release_notes.md
          files: ${{ steps.pack.outputs.tarball }}
          draft: false
          prerelease: false
          make_latest: true

      # --- Publish to npm ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        working-directory: dist/ngx-streaming-player
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
