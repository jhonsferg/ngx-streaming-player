name: Bug Report
description: Report a bug in ngx-streaming-player
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: angular_version
    attributes:
      label: Angular version
      placeholder: "e.g. 17.3.0"
    validations:
      required: true

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol / adapter
      options:
        - HLS
        - DASH
        - MP4 / Native
        - YouTube
        - Not protocol-specific
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure player with ...
        2. Load URL ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, error messages, stack traces, screenshots.
